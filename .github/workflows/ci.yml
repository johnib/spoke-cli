name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    # Skip CI for the release bot's chore(release) commits — they only update
    # CHANGELOG.md + package.json and would otherwise loop forever.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify package bin entry
        run: |
          set -euo pipefail
          bin_path=$(node -e "console.log(require('./package.json').bin.spoke)")
          if [ ! -x "$bin_path" ]; then
            echo "ERROR: bin entry '$bin_path' missing or not executable"
            ls -la "$(dirname $bin_path)" || true
            exit 1
          fi
          # The bin shim loads dist/index.js — verify it exists too.
          if [ ! -f "dist/index.js" ]; then
            echo "ERROR: dist/index.js missing after build"
            ls -la dist/ || true
            exit 1
          fi
          echo "OK: $bin_path exists and dist/index.js was built"

      - name: Smoke test --help
        run: |
          # Catches: bin file syntax errors, missing require, broken commander wiring.
          node bin/spoke --help > /dev/null
          node bin/spoke --version > /dev/null
          echo "OK: --help and --version succeed"
