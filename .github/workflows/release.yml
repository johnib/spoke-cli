name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    # Only run if CI succeeded (or manually triggered). Skip the release-bot's
    # own [skip ci] commit so we don't loop.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success'
       && !contains(github.event.workflow_run.head_commit.message, '[skip ci]'))

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs the full history to compute version + changelog.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
