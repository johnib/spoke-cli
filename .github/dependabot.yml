version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      semantic-release:
        patterns:
          - 'semantic-release'
          - '@semantic-release/*'
      types:
        patterns:
          - '@types/*'
      eslint:
        patterns:
          - 'eslint'
          - '@typescript-eslint/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
